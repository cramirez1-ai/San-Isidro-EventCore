{% extends 'events/base.html' %}

{% block title %}Password Updated - Barangay San Isidro EventCore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="hero-card p-4 p-md-5 text-center">
            <span class="badge badge-soft rounded-pill">Password Updated</span>
            <h1 class="h2 fw-bold mt-3">Your password has been changed</h1>
            <p class="text-muted">You can now log in using your new password.</p>
            <a href="{% url 'login' %}" class="btn btn-eventcore">Login</a>
        </div>
    </div>
</div>
{% endblock %}
