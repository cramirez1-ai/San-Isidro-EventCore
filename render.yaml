services:
  - type: web
    name: san-isidro-eventcore
    env: python
    buildCommand: "pip install -r requirements.txt && ./build.sh"
    startCommand: "gunicorn EventCore.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
